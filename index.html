var S={cpds:[],logs:[],vitals:[],tab:'today',logging:null,editCpd:null,freshStart:false,vitalsOpen:false,loaded:false};

// ── Date helpers ────────────────────────────────────────────────────────────
function pad(v){return String(v).padStart(2,'0');}
var _now=new Date();

  str:_now.getFullYear()+'-'+pad(_now.getMonth()+1)+'-'+pad(_now.getDate()),

};

function nowTime(){return pad(new Date().getHours())+':'+pad(new Date().getMinutes());}
var DEFAULT_TIME='09:00';

// ── Storage ─────────────────────────────────────────────────────────────────
var _st={
  get:function(k){try{var v=localStorage.getItem(k);return Promise.resolve(v?{value:v}:null);}catch(e){return Promise.resolve(null);}},
  set:function(k,v){try{localStorage.setItem(k,v);}catch(e){}return Promise.resolve(null);}
};
function mergeCpds(saved){
  return SEED.map(function(s){
    var sv=saved.find(function(x){return x.id===s.id;});
    if(!sv)return Object.assign({},s);
    var m=Object.assign({},s,sv);
    m.splits=s.splits;
    return m;
  });
}
function load(){
  return _st.get('tony3_v1').then(function(r){
    if(!r){
      return _st.get('tvfr_v3').then(function(r2){if(!r2)return _st.get('tvfr_v2');return r2;}).then(function(old){
        if(old){var d=JSON.parse(old.value);S.cpds=mergeCpds(d.cpds||[]);S.logs=d.logs||[];S.vitals=d.vitals||[];}
        else{S.cpds=SEED.map(function(c){return Object.assign({},c);});}
      });
    }else{var d=JSON.parse(r.value);S.cpds=mergeCpds(d.cpds||[]);S.logs=d.logs||[];S.vitals=d.vitals||[];}
  }).catch(function(){S.cpds=SEED.map(function(c){return Object.assign({},c);});}).then(function(){S.loaded=true;render();});
}

function tlogs(){return S.logs.filter(function(l){return l.date===TODAY.str;});}
function ylogs(){return S.logs.filter(function(l){return l.date===ystrStr();});}
function doneCheck(cid,sid){return tlogs().some(function(l){return l.cid===cid&&(sid?l.sid===sid:!l.sid);});}
function ylogFor(cid,sid){return ylogs().find(function(l){return l.cid===cid&&(sid?l.sid===sid:!l.sid);});}
function tlogFor(cid,sid){return tlogs().find(function(l){return l.cid===cid&&(sid?l.sid===sid:!l.sid);});}

// Quick-toggle: tap circle to log/un-log instantly at default time
function doToggle(cid,sid){
  var d=doneCheck(cid,sid);
  if(d){
    // Remove the log entry
    S.logs=S.logs.filter(function(l){return !(l.date===TODAY.str&&l.cid===cid&&(sid?l.sid===sid:!l.sid));});
  }else{
    var c=S.cpds.find(function(x){return x.id===cid;});
    if(!c)return;
    var split=sid&&c.splits?c.splits.find(function(s){return s.sid===sid;}):null;
    S.logs=[{
      id:'l'+Date.now(),date:TODAY.str,time:DEFAULT_TIME,
      cid:c.id,sid:sid||null,nm:c.name,label:split?split.label:null,
      proto:c.protocol,dose:split?split.dose:c.dose,unit:split?split.unit:c.unit,
      route:c.route,notes:'',missed:false,quick:true
    }].concat(S.logs);
  }
  save();render(true);
}

function doLog(data){
  var c=S.cpds.find(function(x){return x.id===data.cid;});if(!c)return;
  var split=data.sid&&c.splits?c.splits.find(function(s){return s.sid===data.sid;}):null;
  var entry={
    id:data.editId||('l'+Date.now()),date:TODAY.str,time:data.logTime||DEFAULT_TIME,
    cid:c.id,sid:data.sid||null,nm:c.name,label:split?split.label:null,
    proto:c.protocol,dose:data.dose!=null?data.dose:(split?split.dose:c.dose),
    unit:split?split.unit:c.unit,route:data.route||c.route,notes:data.notes||'',missed:!!data.missed
  };
  if(data.editId){S.logs=S.logs.map(function(l){return l.id===data.editId?entry:l;});}
  else{S.logs=[entry].concat(S.logs);}
  S.logging=null;save();render(true);
}

function daysTo(s){if(!s)return 0;var d=new Date(s+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.max(0,Math.ceil((d-n)/86400000));}
function spill(s){var m={ACTIVE:'s-active',UPCOMING:'s-upcoming',PAUSED:'s-paused',DISCONTINUED:'s-paused'};return '<span class="s-tag '+(m[s]||'s-paused')+'">'+s.charAt(0)+s.slice(1).toLowerCase()+'</span>';}

function render(preserveScroll){

    else if(c.dose!=null){total++;if(doneCheck(c.id,null))done++;}
  });
  var b=S.tab==='today'&&total?'<span class="hdr-badge">'+done+'/'+total+' active</span>':'';

function dRow(c){
  var up=c.status==='UPCOMING';

  if(c.splits){
    var m=PMETA[c.protocol];

  }
  var d=doneCheck(c.id,null);
  var lg=tlogFor(c.id,null);
  var yl=ylogFor(c.id,null);
  var loggedDose=d&&lg&&lg.dose!=null?lg.dose+lg.unit:null;
  var expectedDose=c.dose!=null?c.dose+c.unit:'TBD';
  var differs=d&&lg&&c.dose!=null&&String(lg.dose)!==String(c.dose);

  var dispTime=d&&lg&&lg.time?' \u00b7 '+lg.time:(!d&&c.time?' \u00b7 '+c.time:'');

    +'<div class="dose-nm">'+esc(c.name)+tp+'</div>'
    +'<div class="dose-sub">'+dispDose+' \u00b7 '+dispRoute+dispTime+'</div>'
    +(differs?'<div class="dose-delta">Expected '+expectedDose+'</div>':'')

        h+='<div class="hist-row"><div class="hist-dot" style="background:var(--tx-info)"></div><div class="hist-body">'
          +'<div class="hist-head"><span class="hist-nm">Vitals snapshot<span class="tag tag-vitals">vitals</span></span><span class="hist-tm">'+e.time+'</span></div>'
          +(parts.length?'<div class="hist-metric">Energy \u2014 '+parts.join(' \u00b7 ')+'</div>':'')
          +(e.glucose!=null?'<div class="hist-metric">Glucose '+e.glucose+' mg/dL</div>':'')
          +'</div></div>';
      }else{
        var m=(PMETA[e.proto]||{color:'#888'});
        var nm=e.label?esc(e.nm)+' \u00b7 '+esc(e.label):esc(e.nm);
        h+='<div class="hist-row"><div class="hist-dot" style="background:'+m.color+'"></div><div class="hist-body">'
          +'<div class="hist-head"><span class="hist-nm">'+nm+(e.copied?'<span class="tag tag-same">same</span>':'')+(e.quick?'<span class="tag tag-quick">quick</span>':'')+'</span><span class="hist-tm">'+e.time+'</span></div>'
          +'<div class="hist-meta">'+(e.dose!=null?e.dose+e.unit:'\u2014')+' \u00b7 '+e.route+(e.missed?'<span class="tag tag-missed">missed</span>':'')+'</div>'
          +(e.notes?'<div class="hist-note">&ldquo;'+esc(e.notes)+'&rdquo;</div>':'')
          +'</div></div>';
      }
    });
  });
  return h+'</div>';
}

function rCompounds(){
  var grps={};S.cpds.forEach(function(c){if(!grps[c.protocol])grps[c.protocol]=[];grps[c.protocol].push(c);});
  var h='<div class="body">';
  PORDER.forEach(function(p){
    if(!grps[p])return;
    var m=PMETA[p];
    h+='<div class="sec-hdr"><div class="sec-dot" style="background:'+m.color+'"></div>'+icn(m.ic)+' '+p+'</div>';
    grps[p].forEach(function(c){
      var up=c.status==='UPCOMING';
      var doseTxt=c.splits?c.splits.map(function(s){return s.dose+s.unit;}).join(' + ')+' total':c.dose!=null?c.dose+c.unit:'TBD';
      h+='<div class="cpd-card'+(up?' cpd-upcoming':'')+'"><div class="cpd-info">'
        +'<div style="display:flex;align-items:center;justify-content:space-between">'
        +'<div class="cpd-nm'+(up?' upcoming':'')+'">'+esc(c.name)+(up&&TIER_LABELS[c.protocol]?tpill(c.protocol):'')+'</div>'
        +'<button class="btn-edit" data-a="open-cpd-edit" data-id="'+c.id+'">'+icn('pencil')+'</button>'
        +'</div>'
        +'<div class="cpd-meta">'+doseTxt+' \u00b7 '+c.route+' \u00b7 '+c.freq+'</div>'
        +(c.splits?'<div class="cpd-split">'+c.splits.map(function(s){return s.label+': '+s.dose+s.unit+(s.time?' @ '+s.time:'');}).join(' \u00b7 ')+'</div>':'')
        +(!c.splits&&c.time?'<div style="font-size:10px;color:var(--tx3);font-family:var(--mono);margin-top:1px">'+c.time+'</div>':'')
        +(c.notes?'<div class="cpd-note">'+esc(c.notes)+'</div>':'')
        +(up&&c.start?'<div class="upcoming-lbl">'+icn('clock')+' Starts '+fmtD(c.start)+' \u00b7 '+daysTo(c.start)+'d away</div>':'')
        +'</div>'+spill(c.status)+'</div>';
    });
  });
  return h+'</div>';
}

function rProtocols(){
  var h='<div class="body">';
  PMLIST.forEach(function(p){
    var m=PMETA[p.name],cpds=S.cpds.filter(function(c){return c.protocol===p.name;}),du=daysTo(p.start);
    h+='<div class="proto-card"><div class="proto-head"><div>'
      +'<div style="display:flex;align-items:center;gap:.35rem"><div class="sec-dot" style="background:'+m.color+';width:8px;height:8px"></div><span class="proto-nm">'+esc(p.name)+'</span></div>'
      +'<div class="proto-since">'+(p.status==='UPCOMING'?'Starts '+fmtD(p.start)+' \u00b7 <span style="color:'+m.color+'">'+du+'d away</span>':'Since '+fmtD(p.start))+'</div>'
      +'</div>'+spill(p.status)+'</div>'
      +'<div class="proto-note">'+esc(p.note)+'</div>'
      +'<div class="chips">'+cpds.map(function(c){return '<div class="chip">'+esc(c.name)+(c.dose!=null&&!c.splits?'<span class="chip-d">'+c.dose+c.unit+'</span>':c.splits?'<span class="chip-d">split</span>':'')+'</div>';}).join('')+'</div></div>';
  });
  return h+'</div>';
}

function rCpdEditForm(){
  var c=S.cpds.find(function(x){return x.id===S.editCpd;});
  if(!c)return rHdr()+rTabs()+rContent();
  var m=PMETA[c.protocol]||{color:'#888'};
  var h='<div><div class="form-hdr"><button class="back-btn" data-a="back-cpd">'+icn('arrow-left')+' Back</button><span class="form-title">Edit compound</span></div>'
    +'<div class="form-body"><div class="form-proto" style="color:'+m.color+'">'+esc(c.protocol)+'</div><div class="form-nm">'+esc(c.name)+'</div>';
  if(c.splits){
    h+='<div style="margin-bottom:.75rem;padding:.625rem;background:var(--bg2);border-radius:var(--r);font-size:12px;color:var(--tx2)">Split dosing \u2014 edit each entry below</div>';
    c.splits.forEach(function(s,i){
      h+='<div class="split-edit-box"><div class="split-edit-label">'+esc(s.label)+'</div>'
        +'<div class="split-edit-row"><div style="position:relative;flex:1"><input type="number" step="any" id="sd'+i+'" value="'+(s.dose!=null?s.dose:'')+'" placeholder="dose" style="padding-right:36px">'
        +'<span style="position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--tx3);pointer-events:none;font-family:var(--mono)">'+s.unit+'</span></div>'
        +'<input type="time" id="st'+i+'" value="'+(s.time||'')+'" style="flex:1"></div></div>';
    });
  }else{
    h+='<div class="fi"><label class="fl" for="cd">Default dose</label>'
      +'<div class="inp-u"><input id="cd" type="number" step="any" value="'+(c.dose!=null?c.dose:'')+'" placeholder="amount"><span class="u-lbl">'+c.unit+'</span></div></div>'
      +'<div class="fi"><label class="fl" for="ct">Scheduled time</label><input id="ct" type="time" value="'+(c.time||'')+'"></div>';
  }
  h+='<div class="fi"><label class="fl" for="cr">Route</label><select id="cr">'
    +['Oral','Subcutaneous','Intramuscular','IV','Topical'].map(function(r){return '<option'+(r===c.route?' selected':'')+'>'+r+'</option>';}).join('')+'</select></div>'
    +'<div class="fi"><label class="fl" for="cn">Notes</label><textarea id="cn" style="height:64px">'+esc(c.notes||'')+'</textarea></div>'
    +'<div class="fi"><label class="fl" for="cs">Status</label><select id="cs">'
    +['ACTIVE','UPCOMING','PAUSED','DISCONTINUED'].map(function(s){return '<option'+(s===c.status?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div>'
    +'<button class="btn-full" data-a="save-cpd" data-id="'+c.id+'">Save changes</button></div></div>';
  return h;
}

function rLogForm(){
  var cid=S.logging.cid,sid=S.logging.sid,editId=S.logging.editId;
  var c=S.cpds.find(function(x){return x.id===cid;});
  if(!c)return rHdr()+rTabs()+rContent();
  var m=PMETA[c.protocol]||{color:'#888'};
  var split=sid&&c.splits?c.splits.find(function(s){return s.sid===sid;}):null;
  var existing=editId?S.logs.find(function(l){return l.id===editId;}):null;
  var yl=!editId?(sid?ylogFor(cid,sid):ylogFor(cid,null)):null;
  var prefill=existing||yl;
  var defDose=prefill&&prefill.dose!=null?prefill.dose:(split?split.dose:c.dose);
  var defRoute=prefill?prefill.route:c.route;
  var defNotes=prefill?prefill.notes:'';
  var defTime=existing?existing.time:DEFAULT_TIME;
  var defMissed=existing?existing.missed:false;
  var subLbl=split?esc(split.label)+' \u00b7 '+split.dose+split.unit:(c.dose!=null?c.dose+c.unit:'Enter dose below');
  return '<div><div class="form-hdr"><button class="back-btn" data-a="back">'+icn('arrow-left')+' Back</button>'
    +'<span class="form-title">'+(editId?'Edit dose':'Log dose')+'</span></div>'
    +'<div class="form-body"><div class="form-proto" style="color:'+m.color+'">'+esc(c.protocol)+'</div>'
    +'<div class="form-nm">'+esc(c.name)+'</div>'
    +'<div class="form-sub">'+subLbl+' \u00b7 '+c.route+'</div>'
    +'<div class="fi"><label class="fl" for="ft">Time taken</label><input id="ft" type="time" value="'+defTime+'"></div>'
    +'<div class="fi"><label class="fl" for="fd">Dose administered</label>'
    +'<div class="inp-u"><input id="fd" type="number" step="any" value="'+(defDose!=null?defDose:'')+'" placeholder="amount">'
    +'<span class="u-lbl">'+(split?split.unit:c.unit)+'</span></div></div>'
    +'<div class="fi"><label class="fl" for="fr">Route</label><select id="fr">'
    +['Oral','Subcutaneous','Intramuscular','IV','Topical'].map(function(r){return '<option'+(r===defRoute?' selected':'')+'>'+r+'</option>';}).join('')+'</select></div>'
    +'<div class="fi"><label class="fl" for="fn">Notes <span class="fl-opt">(optional)</span></label>'
    +'<textarea id="fn" style="height:72px" placeholder="Observations, side effects, pain level...">'+(defNotes?esc(defNotes):'')+'</textarea></div>'
    +'<label class="miss-row"><input id="fm" type="checkbox"'+(defMissed?' checked':'')+'>  <span>Mark as missed dose</span></label>'
    +'<button class="btn-full" data-a="submit" data-id="'+cid+'" data-sid="'+(sid||'')+'" data-eid="'+(editId||'')+'">'
    +(editId?'Save changes':'Confirm dose logged')+'</button></div></div>';
}

// ── Event binding ───────────────────────────────────────────────────────────
function bind(){
  document.querySelectorAll('[data-a]').forEach(function(el){el.addEventListener('click',onClick);});
  document.querySelectorAll('[data-eg] .e-btn').forEach(function(b){
    b.addEventListener('click',function(){
      var type=b.closest('[data-eg]').dataset.eg,val=+b.dataset.n;
      if(type==='yest')_ey=val;else _ec=val;
      b.closest('[data-eg]').querySelectorAll('.e-btn').forEach(function(x){x.classList.toggle('sel',+x.dataset.n<=val);});
    });
  });
}

function onClick(e){
  var el=e.currentTarget;
  var a=el.dataset.a,cid=el.dataset.id,sid=el.dataset.sid,lid=el.dataset.lid,eid=el.dataset.eid;
  if(a==='tab'){S.tab=el.dataset.v;render(false);}
  else if(a==='toggle'){doToggle(cid,sid||null);}
  else if(a==='open-log'){S.logging={cid:cid,sid:null,editId:null};render(false);}
  else if(a==='open-split-log'){S.logging={cid:cid,sid:sid,editId:null};render(false);}
  else if(a==='edit-log'){var lg=S.logs.find(function(l){return l.id===lid;});if(lg)S.logging={cid:lg.cid,sid:lg.sid||null,editId:lg.id};render(false);}
  else if(a==='back'){S.logging=null;render(false);}
  else if(a==='same-one'){doSameOne(cid,null);}
  else if(a==='same-split'){doSameOne(cid,sid);}
  else if(a==='same-all'){doSameAll();}
  else if(a==='fresh-start'){doFreshStart();}
  else if(a==='open-vitals'){var tv=S.vitals.filter(function(v){return v.date===TODAY.str;});if(tv.length){_ey=tv[0].energyYest;_ec=tv[0].energyCurrent;}S.vitalsOpen=true;render(true);}
  else if(a==='save-vitals'){doSaveVitals();}
  else if(a==='open-cpd-edit'){S.editCpd=cid;render(false);}
  else if(a==='back-cpd'){S.editCpd=null;render(false);}
  else if(a==='save-cpd'){doSaveCpd(cid);}
  else if(a==='submit'){
    e.stopPropagation();
    var ftEl=document.getElementById('ft'),fdEl=document.getElementById('fd');
    var dose=fdEl?parseFloat(fdEl.value):NaN;
    doLog({cid:cid,sid:sid||null,editId:eid||null,logTime:ftEl?ftEl.value:DEFAULT_TIME,dose:isNaN(dose)?null:dose,route:(document.getElementById('fr')||{}).value,notes:(document.getElementById('fn')||{}).value,missed:!!(document.getElementById('fm')||{}).checked});
  }
}

load();
</script>
