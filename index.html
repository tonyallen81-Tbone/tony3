<style>
:root{--bg:#fff;--bg2:#f4f4f5;--bg-info:#eff6ff;--bg-ok:#f0fdf4;--bg-warn:#fffbeb;--bg-err:#fef2f2;--tx:#111827;--tx2:#4b5563;--tx3:#9ca3af;--tx-info:#2563eb;--tx-ok:#16a34a;--tx-warn:#d97706;--tx-err:#dc2626;--bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.12);--bd-info:#bfdbfe;--bd-ok:#bbf7d0;--bd-warn:#fde68a;--bd-err:#fecaca;--sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;--mono:'SF Mono',Menlo,'Courier New',monospace;--r:8px;--rl:12px}

.dose-info{flex:1;min-width:0}

.btn-edit{display:flex;align-items:center;gap:3px;background:none;border:none;color:var(--tx-info);font-size:13px;font-family:var(--mono);padding:2px 4px;flex-shrink:0;font-weight:500}

.tag-same{background:var(--bg-ok);color:var(--tx-ok)}

.tag-quick{background:var(--bg-info);color:var(--tx-info)}
.cpd-card{display:flex;align-items:flex-start;gap:.625rem;padding:.625rem .75rem;background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);margin-bottom:.3rem}

.cpd-note{font-size:11px;color:var(--tx3);font-style:italic;margin-top:2px}
.upcoming-lbl{font-size:11px;color:var(--tx-warn);font-family:var(--mono);margin-top:2px}
.s-tag{padding:3px 8px;border-radius:var(--r);font-size:11px;font-weight:500;flex-shrink:0}
.s-active{background:var(--bg-ok);color:var(--tx-ok)}
.s-upcoming{background:var(--bg-warn);color:var(--tx-warn)}
.s-paused{background:var(--bg2);color:var(--tx3);border:.5px solid var(--bd)}
.proto-card{padding:.875rem;background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--rl);margin-bottom:.75rem}

.proto-nm{font-size:14px;font-weight:500}
.proto-since{font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:2px}

.form-hdr{display:flex;align-items:center;gap:.75rem;padding:.875rem 1rem;border-bottom:.5px solid var(--bd)}
.back-btn{display:flex;align-items:center;gap:3px;font-size:13px;color:var(--tx-info);background:none;border:none;font-family:var(--sans);padding:0}

/* ── Desktop layout (768px+) ─────────────────────────────────────────────── */
@media(min-width:768px){
  body{padding:1.5rem}
  #app{max-width:1200px;border-radius:16px;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,.12);min-height:auto}
  .hdr{border-radius:0;top:0;padding:1rem 1.5rem}
  .hdr-brand{font-size:18px}
  .hdr-tag{font-size:13px}
  .tabs{top:61px;display:none} /* hide mobile tabs on desktop */
  .desktop-layout{display:grid;grid-template-columns:380px 1fr;grid-template-rows:auto;gap:0;min-height:80vh}
  .desktop-left{border-right:.5px solid var(--bd);overflow-y:auto;max-height:calc(100vh - 130px);position:sticky;top:61px}
  .desktop-right{overflow-y:auto;max-height:calc(100vh - 130px);background:var(--bg)}
  .desktop-right-inner{padding:1.5rem}
  .desktop-nav{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}

  /* Data table */
  .data-table{width:100%;border-collapse:collapse;font-size:13px}
  .data-table th{text-align:left;padding:.5rem .75rem;border-bottom:.5px solid var(--bd2);font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  .data-table td{padding:.5rem .75rem;border-bottom:.5px solid var(--bd);color:var(--tx2);font-family:var(--mono);font-size:12px}
  .data-table tr:hover td{background:var(--bg2)}
  .data-table .tx{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--tx)}
  /* Streak cards */
  .streak-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.625rem;margin-bottom:1.25rem}
  .streak-card{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:.75rem}
  .streak-card-nm{font-size:12px;font-weight:500;color:var(--tx);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .streak-card-val{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--tx-info)}
  .streak-card-lbl{font-size:10px;color:var(--tx3);margin-top:1px}
  .streak-bar{height:3px;background:var(--bd);border-radius:2px;margin-top:6px;overflow:hidden}
  .streak-bar-fill{height:100%;border-radius:2px;background:var(--tx-info)}
  /* Export panel */
  .export-panel{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-top:1.25rem}
  .export-row{display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap;margin-bottom:.75rem}
  .export-row .fi{margin-bottom:0;min-width:140px}
  .btn-export{padding:.625rem 1.25rem;background:var(--tx-info);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap}
  .btn-export-sec{padding:.625rem 1.25rem;background:none;border:.5px solid var(--bd2);color:var(--tx2);border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap}
  /* Vitals trend mini */
  .vit-trend-row{display:flex;gap:.75rem;margin-bottom:1.25rem}
  .vit-trend-card{flex:1;background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:.75rem}
  .vit-trend-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--tx3);margin-bottom:4px}
  .vit-trend-val{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--tx)}
  .vit-trend-sub{font-size:11px;color:var(--tx3);margin-top:2px}
  /* Tag pill for table */
  .tpill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;font-family:var(--sans)}
  .tpill-ok{background:var(--bg-ok);color:var(--tx-ok)}

@media(max-width:767px){
  .desktop-layout{display:block}
  .desktop-left,.desktop-right{all:unset;display:block}
  .desktop-nav,.desk-tab,.data-table,.export-panel,.streak-grid,.vit-trend-row{display:none!important}
  .desktop-right-inner{display:none!important}
}

<body>
<h1 class="sr-only">Tony³ — longevity, performance, cognition</h1>
<div id="app"><div style="padding:3rem;text-align:center;color:#9ca3af;font-family:system-ui">Loading Tony\u00b3...</div></div>
<script>
// ── Generate blue home screen icon ─────────────────────────────────────────
(function(){
  try {
    var c=document.createElement('canvas');
    c.width=180;c.height=180;
    var ctx=c.getContext('2d');
    var r=22;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(180-r,0);ctx.quadraticCurveTo(180,0,180,r);
    ctx.lineTo(180,180-r);ctx.quadraticCurveTo(180,180,180-r,180);
    ctx.lineTo(r,180);ctx.quadraticCurveTo(0,180,0,180-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();
    var g=ctx.createLinearGradient(0,0,180,180);
    g.addColorStop(0,'#1d4ed8');g.addColorStop(1,'#2563eb');
    ctx.fillStyle=g;ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath();ctx.arc(90,30,70,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';
    ctx.font='italic bold 130px Georgia,serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=8;
    ctx.fillText('T',90,100);
    var lnk=document.getElementById('ati');
    lnk.href=c.toDataURL('image/png');
  } catch(e){}
})();

// ── Data ───────────────────────────────────────────────────────────────────
var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var TIER_LABELS={'Tier 1 Stack':'T1','Tier 2 Stack':'T2','Tier 3 Stack':'T3','Tier 3.5 Stack':'T3.5','Optional Stack':'OPT'};
var PMETA={

function daysTo(s){if(!s)return 0;var d=new Date(s+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.max(0,Math.ceil((d-n)/86400000));}
function spill(s){var m={ACTIVE:'s-active',UPCOMING:'s-upcoming',PAUSED:'s-paused',DISCONTINUED:'s-paused'};return '<span class="s-tag '+(m[s]||'s-paused')+'">'+s.charAt(0)+s.slice(1).toLowerCase()+'</span>';}
function icn(n){return '<i class="ti ti-'+n+'" aria-hidden="true"></i>';}
function tpill(proto){var t=TIER_LABELS[proto];return t?'<span class="tier-pill">'+t+'</span>':'';}
function eGrid(type,pre){

function render(preserveScroll){

function pushLab(entry){
  var row={id:entry.id,draw_date:entry.draw_date,draw_label:entry.draw_label||'',
    marker:entry.marker,value:entry.value,unit:entry.unit||'',flag:entry.flag||'normal',notes:entry.notes||''};
  sbUpsert('lab_results',row).catch(function(e){console.error('pushLab error:',e);});
}

function pushLabsBatch(entries){
  if(!entries||!entries.length)return;
  var rows=entries.map(function(e){return {id:e.id,draw_date:e.draw_date,draw_label:e.draw_label||'',
    marker:e.marker,value:e.value,unit:e.unit||'',flag:e.flag||'normal',notes:e.notes||''};});
  sbUpsert('lab_results',rows).then(function(r){
    if(r&&!r.ok)r.text().then(function(t){console.warn('pushLabsBatch:',r.status,t.slice(0,200));});
  }).catch(function(e){console.warn('pushLabsBatch failed (offline?):', e.message);});
}

function seedLabResults(){
  S.labResults=LAB_DRAWS_SEED.map(function(d){return Object.assign({},d);});
  // Cache locally immediately
  _ls.set('tony3_cache',{logs:S.logs,vitals:S.vitals,savedDays:S.savedDays});
  // Push to Supabase with retry
  setTimeout(function(){
    var rows=S.labResults.map(function(e){return {
      id:e.id,draw_date:e.draw_date,draw_label:e.draw_label||'',
      marker:e.marker,value:e.value,unit:e.unit||'',flag:e.flag||'normal',notes:e.notes||''
    };});
    sbUpsert('lab_results',rows).then(function(r){
      if(r&&r.ok)console.log('Lab seed uploaded to Supabase');
      else r&&r.text().then(function(t){console.warn('Lab seed response:',r.status,t);});
    }).catch(function(e){
      console.warn('Lab seed push failed, will retry on next load:',e.message);
    });
  },2000);
}

function getLabValue(marker,date){
  var entries=S.labResults.filter(function(r){return r.marker===marker;});
  if(date){return entries.find(function(r){return r.draw_date===date;})||null;}
  entries.sort(function(a,b){return b.draw_date.localeCompare(a.draw_date);});
  return entries.length?entries[0]:null;
}

function getLabHistory(marker){
  return S.labResults.filter(function(r){return r.marker===marker;})
    .sort(function(a,b){return a.draw_date.localeCompare(b.draw_date);});
}

function getDrawDates(){
  var dates={};
  S.labResults.forEach(function(r){if(!dates[r.draw_date])dates[r.draw_date]=r.draw_label||r.draw_date;});
  return Object.keys(dates).sort(function(a,b){return b.localeCompare(a);});
}

function doSaveLabDraw(drawDate,drawLabel){
  var inputs=document.querySelectorAll('[data-lab-marker]');
  var newEntries=[];
  inputs.forEach(function(inp){
    var marker=inp.dataset.labMarker;
    var val=parseFloat(inp.value);
    if(isNaN(val))return;
    var m=LAB_MARKERS.find(function(x){return x.id===marker;});
    var flag='normal';
    if(m){
      if(m.flag_high!=null&&val>m.flag_high)flag='high';
      else if(m.flag_low!=null&&val<m.flag_low)flag='low';
      else if(val>m.target_high)flag='high';
      else if(m.target_low!=null&&val<m.target_low)flag='low';
    }
    var entry={id:'lab_'+drawDate.replace(/-/g,'')+'_'+marker,draw_date:drawDate,draw_label:drawLabel||drawDate,
      marker:marker,value:val,unit:m?m.unit:'',flag:flag,notes:''};
    newEntries.push(entry);
    // Remove old entry for same date+marker
    S.labResults=S.labResults.filter(function(r){return !(r.draw_date===drawDate&&r.marker===marker);});
  });
  S.labResults=S.labResults.concat(newEntries);
  pushLabsBatch(newEntries);
  S.addingLab=false;
  render(false);
}


function labStatusColor(flag){
  if(flag==='high')return 'var(--tx-err)';
  if(flag==='low')return 'var(--tx-warn)';
  return 'var(--tx-ok)';
}
function labStatusBg(flag){
  if(flag==='high')return 'var(--bg-err)';
  if(flag==='low')return 'var(--bg-warn)';
  return 'var(--bg-ok)';
}
function labTrendArrow(marker){
  var hist=getLabHistory(marker);
  if(hist.length<2)return '';
  var prev=hist[hist.length-2].value,curr=hist[hist.length-1].value;
  var diff=curr-prev;
  var pct=Math.abs(diff/prev*100).toFixed(1);
  var m=LAB_MARKERS.find(function(x){return x.id===marker;});
  // For markers where lower is better (glucose, LDL, E2, etc)
  var lowerBetter=['glucose_fasting','hba1c','creatinine','ldl','apob','non_hdl','triglycerides','hs_crp','glyca','estradiol','psa'];
  var isLowerBetter=lowerBetter.indexOf(marker)>-1;
  var improving=(isLowerBetter&&diff<0)||(!isLowerBetter&&diff>0);
  var arrow=diff>0?'\u2191':'\u2193';
  var color=improving?'var(--tx-ok)':'var(--tx-err)';
  if(Math.abs(diff)<0.01)return '<span style="color:var(--tx3);font-size:11px">\u2192 stable</span>';
  return '<span style="color:'+color+';font-size:11px;font-family:var(--mono)">'+arrow+' '+pct+'%</span>';
}

    h+='</tbody></table></div>';
  }

  // Category filter tabs
  var labCats2=['Hormonal','Metabolic','CBC / Hematology','Lipids','Inflammation','Micronutrients'];

  h+='</div>';

  // Marker cards for selected category
  var catMarkers2=LAB_MARKERS.filter(function(m){return m.cat===S.labCat;});
  catMarkers2.forEach(function(m){
    var hist2=getLabHistory(m.id);
    var latest2=hist2.length?hist2[hist2.length-1]:null;
    var prev2=hist2.length>1?hist2[hist2.length-2]:null;
    var flag2=latest2?latest2.flag:'none';

    h+='<div style="background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:.75rem;margin-bottom:.5rem;cursor:pointer" data-a="open-lab-detail" data-mid="'+m.id+'">';

    h+='<div style="font-size:13px;font-weight:600">'+esc(m.name)+'</div>';
    if(latest2){
      h+='<div style="text-align:right">';
      h+='<div style="font-size:18px;font-weight:700;font-family:var(--mono);color:'+labStatusColor(flag2)+'">'+latest2.value+'<span style="font-size:11px;font-weight:400;color:var(--tx3)"> '+esc(latest2.unit)+'</span></div>';

      var pct2=Math.min(100,Math.max(0,((latest2.value-tLow2)/(fHigh2-tLow2))*100));
      var targetPct2=Math.min(100,((m.target_high-tLow2)/(fHigh2-tLow2))*100);

      h+='<div style="position:absolute;left:0;top:0;height:100%;width:'+targetPct2+'%;background:var(--bg-ok);border-radius:2px"></div>';
      h+='<div style="position:absolute;left:0;top:0;height:100%;width:'+pct2+'%;background:'+labStatusColor(flag2)+';border-radius:2px;transition:width .4s"></div>';
      h+='</div>';
      h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);font-family:var(--mono);margin-bottom:.375rem">';
      h+='<span>Target: '+tLow2+'–'+m.target_high+'</span>';
      if(prev2)h+='<span>Prev: '+prev2.value+' ('+prev2.draw_date+')</span>';
      h+='</div>';
    }
    // Draw dots
    if(hist2.length>0){

      hist2.forEach(function(e){
        h+='<div title="'+e.draw_date+': '+e.value+' '+e.unit+'" style="display:flex;flex-direction:column;align-items:center;gap:2px">';

      });
      h+='<span style="font-size:10px;color:var(--tx3);margin-left:4px">Tap for full detail →</span>';
      h+='</div>';
    }
    h+='<div style="font-size:11px;color:var(--tx3);font-style:italic;line-height:1.5">'+esc(m.note)+'</div>';
    h+='</div>';
  });

  return h+'</div>';
}



function pushJournal(entry){
  sbUpsert('journal_entries',{
    id:entry.id,entry_date:entry.entry_date,week_label:entry.week_label||'',
    body:entry.body||'',mood:entry.mood||null,energy:entry.energy||null
  }).catch(function(e){console.warn('pushJournal error:',e.message);});
}

function deleteJournal(id){
  sbDelete('journal_entries','id',id).catch(function(e){console.warn('deleteJournal error:',e.message);});
}

function doSaveJournal(){
  var dateEl=document.getElementById('jnl-date');
  var labelEl=document.getElementById('jnl-label');
  var bodyEl=document.getElementById('jnl-body');
  var moodEl=document.getElementById('jnl-mood');
  if(!bodyEl||!bodyEl.value.trim())return;
  var entry={
    id:S.editJournalId||('j'+Date.now()),
    entry_date:dateEl?dateEl.value:TODAY.str,
    week_label:labelEl?labelEl.value:'',
    body:bodyEl.value.trim(),
    mood:moodEl?parseInt(moodEl.value)||null:null,
    energy:null,
    created_at:new Date().toISOString()
  };
  if(S.editJournalId){
    S.journal=S.journal.map(function(j){return j.id===S.editJournalId?entry:j;});
  }else{
    S.journal=[entry].concat(S.journal);
  }
  pushJournal(entry);
  S.addingJournal=false;
  S.editJournalId=null;
  save();render(false);
}

function fmtMins(ms){
  if(!ms)return '--';
  var m=Math.round(ms/60000);
  var h=Math.floor(m/60);
  var min=m%60;
  return h>0?h+'h '+(min>0?min+'m':''):min+'m';
}

    h+='</div></div>';

  // 14-day HRV + Strain trend
  if(S.whoopRecovery.length>1){
    var last14rec=S.whoopRecovery.slice(0,14).reverse();

    var cycleMap={};
    S.whoopCycles.forEach(function(c){
      var d=c.start_time?c.start_time.slice(0,10):'';
      if(d)cycleMap[d]=c;
    });

    var hrvVals=last14rec.map(function(r){return r.score_hrv_rmssd_milli||0;});
    var maxHrv=Math.max.apply(null,hrvVals)||1;
    var minHrv=Math.min.apply(null,hrvVals.filter(function(v){return v>0;}))||0;
    var hrvRange=maxHrv-minHrv||1;

    // For strain: previous day's cycle strain
    var strainVals=last14rec.map(function(r,i){
      var prevDate=last14rec[i-1]?last14rec[i-1].created_at.slice(0,10):'';
      var cyc=cycleMap[prevDate];
      return cyc&&cyc.score_strain?cyc.score_strain:null;
    });
    var strainMax=Math.max.apply(null,strainVals.filter(function(v){return v!=null;}))||21;

    var chartH=120;
    h+='<div style="background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--rl);padding:1rem;margin-bottom:.75rem">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">';
    h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3)">14-day HRV & Strain</div>';
    h+='<div style="display:flex;gap:.875rem;font-size:10px;color:var(--tx3)">';
    h+='<span><span style="display:inline-block;width:10px;height:3px;background:var(--tx-info);border-radius:2px;vertical-align:middle;margin-right:3px"></span>HRV</span>';
    h+='<span><span style="display:inline-block;width:10px;height:3px;background:var(--tx-err);border-radius:2px;vertical-align:middle;margin-right:3px"></span>Strain (prev day)</span>';
    h+='</div></div>';

    // SVG chart
    var svgW=600, svgH=chartH+40;
    var padL=30, padR=10, padT=10, padB=30;
    var chartW=svgW-padL-padR;
    var n=last14rec.length;
    var xStep=n>1?chartW/(n-1):chartW;

    // Build point coords
    var hrvPts=[], strainPts=[];
    last14rec.forEach(function(r,i){
      var x=padL+(i*xStep);
      var hrv=r.score_hrv_rmssd_milli||0;
      var yHrv=hrv>0?padT+chartH-((hrv-minHrv)/hrvRange*chartH):null;
      if(yHrv!=null)hrvPts.push({x:x,y:yHrv,hrv:Math.round(hrv)});
      else hrvPts.push(null);

      var prevDate=last14rec[i-1]?last14rec[i-1].created_at.slice(0,10):'';
      var cyc=cycleMap[prevDate];
      var strain=cyc&&cyc.score_strain?cyc.score_strain:null;
      if(strain!=null){
        var yStrain=padT+chartH-(strain/strainMax*chartH);
        strainPts.push({x:x,y:yStrain,strain:strain.toFixed(1)});
      }else{
        strainPts.push(null);
      }
    });

    // Build SVG path
    function makePath(pts,col){
      var d='';
      pts.forEach(function(p,i){
        if(!p)return;
        if(d===''||!pts[i-1])d+='M'+p.x.toFixed(1)+','+p.y.toFixed(1);
        else d+='L'+p.x.toFixed(1)+','+p.y.toFixed(1);
      });
      return d?'<path d="'+d+'" stroke="'+col+'" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>':'';
    }

    var svg='<svg viewBox="0 0 '+svgW+' '+svgH+'" style="width:100%;height:'+(chartH+40)+'px">';
    // Grid lines
    svg+='<line x1="'+padL+'" y1="'+padT+'" x2="'+(svgW-padR)+'" y2="'+padT+'" stroke="var(--bd)" stroke-width="0.5"/>';
    svg+='<line x1="'+padL+'" y1="'+(padT+chartH/2)+'" x2="'+(svgW-padR)+'" y2="'+(padT+chartH/2)+'" stroke="var(--bd)" stroke-width="0.5" stroke-dasharray="3,3"/>';
    svg+='<line x1="'+padL+'" y1="'+(padT+chartH)+'" x2="'+(svgW-padR)+'" y2="'+(padT+chartH)+'" stroke="var(--bd)" stroke-width="0.5"/>';
    // Y labels HRV
    svg+='<text x="'+(padL-4)+'" y="'+(padT+4)+'" text-anchor="end" fill="var(--tx3)" font-size="9">'+Math.round(maxHrv)+'</text>';
    svg+='<text x="'+(padL-4)+'" y="'+(padT+chartH+4)+'" text-anchor="end" fill="var(--tx3)" font-size="9">'+Math.round(minHrv)+'</text>';
    // Lines
    svg+=makePath(hrvPts,'#3b82f6');
    svg+=makePath(strainPts.filter(function(p){return p;})[0]?strainPts:'','#ef4444');
    // HRV dots + values
    hrvPts.forEach(function(p,i){
      if(!p)return;
      var rec=last14rec[i].score_recovery_score||0;
      var col=rec>=67?'#22c55e':rec>=34?'#f59e0b':'#ef4444';
      svg+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3" fill="'+col+'" stroke="white" stroke-width="1"/>';
    });
    // Strain dots
    strainPts.forEach(function(p){
      if(!p)return;
      svg+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3" fill="#ef4444" stroke="white" stroke-width="1"/>';
    });
    // X axis labels (day names)
    last14rec.forEach(function(r,i){
      var x=padL+(i*xStep);
      var day=new Date(r.created_at+'').toLocaleDateString('en-US',{weekday:'short'});
      var dateShort=r.created_at.slice(5,10);
      svg+='<text x="'+x.toFixed(1)+'" y="'+(padT+chartH+18)+'" text-anchor="middle" fill="var(--tx3)" font-size="8">'+day+'</text>';
      svg+='<text x="'+x.toFixed(1)+'" y="'+(padT+chartH+28)+'" text-anchor="middle" fill="var(--tx3)" font-size="7">'+dateShort+'</text>';
    });
    svg+='</svg>';

    h+=svg;

    // Value summary row below chart
    h+='<div style="display:flex;justify-content:space-between;margin-top:.5rem;font-size:10px;color:var(--tx3)">';
    h+='<span>HRV range: <b style="color:var(--tx)">'+Math.round(minHrv)+' – '+Math.round(maxHrv)+' ms</b></span>';
    var strainFiltered=strainVals.filter(function(v){return v!=null;});
    if(strainFiltered.length){
      var avgStrain=(strainFiltered.reduce(function(a,b){return a+b;},0)/strainFiltered.length).toFixed(1);
      h+='<span>Avg strain: <b style="color:var(--tx)">'+avgStrain+'</b></span>';
    }
    h+='</div>';
    h+='</div>';
  }

  // 7-day recovery history table
  if(S.whoopRecovery.length){
    h+='<div style="font-size:13px;font-weight:600;margin-bottom:.5rem">Recent recovery history</div>';
    h+='<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Date</th><th>Recovery</th><th>HRV</th><th>Resting HR</th><th>SpO2</th></tr></thead><tbody>';
    S.whoopRecovery.slice(0,14).forEach(function(r){
      var rec=r.score_recovery_score!=null?Math.round(r.score_recovery_score):null;
      var recColor=rec!=null?(rec>=67?'var(--tx-ok)':rec>=34?'var(--tx-warn)':'var(--tx-err)'):'var(--tx3)';
      h+='<tr>'
        +'<td style="font-family:var(--mono)">'+r.created_at.slice(0,10)+'</td>'
        +'<td><span style="font-weight:700;color:'+recColor+';font-family:var(--mono)">'+(rec!=null?rec+'%':'--')+'</span></td>'
        +'<td style="font-family:var(--mono)">'+(r.score_hrv_rmssd_milli?Math.round(r.score_hrv_rmssd_milli)+' ms':'--')+'</td>'
        +'<td style="font-family:var(--mono)">'+(r.score_resting_heart_rate?Math.round(r.score_resting_heart_rate)+' bpm':'--')+'</td>'
        +'<td style="font-family:var(--mono)">'+(r.score_spo2_percentage?Math.round(r.score_spo2_percentage)+'%':'--')+'</td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
  }

  return h+'</div>';
}

  recent.forEach(function(l){
    var m=PMETA[l.proto]||{color:'#888'};
    var status=l.missed?'<span class="tpill tpill-err">Missed</span>':l.copied?'<span class="tpill tpill-info">Same</span>':l.quick?'<span class="tpill tpill-ok">Quick</span>':'<span class="tpill tpill-ok">Logged</span>';
    var dow=new Date(l.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long'});
      h+='<tr>'
      +'<td style="white-space:nowrap">'+l.date+'<div style="font-size:10px;color:var(--tx3)">'+dow+'</div></td>'
      +'<td>'+l.time+'</td>'
      +'<td class="tx"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+m.color+';margin-right:6px;vertical-align:middle"></span>'+esc(l.label?l.nm+' · '+l.label:l.nm)+'</td>'

function doExport(type){
  var fromEl=document.getElementById('exp-from');
  var toEl=document.getElementById('exp-to');
  var from=fromEl?fromEl.value:'2000-01-01';
  var to=toEl?toEl.value:TODAY.str;
  if(type==='logs'||type==='all'){
    var rows=S.logs.filter(function(l){return l.date>=from&&l.date<=to;})
      .sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
    var csv='date,time,compound,split_label,protocol,dose,unit,route,notes,missed,quick,copied\n';
    rows.forEach(function(l){
      var nm=(l.nm||'').replace(/"/g,'""');
      var lbl=(l.label||'').replace(/"/g,'""');
      var proto=(l.proto||'').replace(/"/g,'""');
      var route=(l.route||'').replace(/"/g,'""');
      var notes=(l.notes||'').replace(/"/g,'""');
      csv+=l.date+','+l.time+',"'+nm+'","'+lbl+'","'+proto+'",';
      csv+=(l.dose!=null?l.dose:'')+','+(l.unit||'')+'"'+route+'","'+notes+'",';
      csv+=(l.missed?1:0)+','+(l.quick?1:0)+','+(l.copied?1:0)+'\n';
    });
    downloadCSV(csv,'tony3_logs_'+from+'_'+to+'.csv');
  }
  if(type==='vitals'||type==='all'){
    var vrows=S.vitals.filter(function(v){return v.date>=from&&v.date<=to;})
      .sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
    var vcsv='date,time,energy_yesterday,energy_current,glucose_mgdl\n';
    vrows.forEach(function(v){
      vcsv+=v.date+','+v.time+',';
      vcsv+=(v.energyYest!=null?v.energyYest:'')+','+(v.energyCurrent!=null?v.energyCurrent:'')+','+(v.glucose!=null?v.glucose:'')+'\n';
    });
    downloadCSV(vcsv,'tony3_vitals_'+from+'_'+to+'.csv');
  }
}
function downloadCSV(csv,filename){
  var blob=new Blob([csv],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function doLogPast(){
  var dateEl=document.getElementById('past-date');
  var timeEl=document.getElementById('past-time');
  var cpdEl=document.getElementById('past-cpd');
  var doseEl=document.getElementById('past-dose');
  var notesEl=document.getElementById('past-notes');
  if(!dateEl||!cpdEl)return;
  var parts=(cpdEl.value||'').split('|');
  var cid=parts[0], sid=parts[1]||null;
  var c=S.cpds.find(function(x){return x.id===cid;});
  if(!c)return;
  var split=sid&&c.splits?c.splits.find(function(s){return s.sid===sid;}):null;
  var dose=parseFloat(doseEl?doseEl.value:'');
  var entry={
    id:'l'+Date.now(),
    date:dateEl.value,
    time:timeEl?timeEl.value:'09:00',
    cid:c.id, sid:sid||null,
    nm:c.name, label:split?split.label:null,
    proto:c.protocol,
    dose:isNaN(dose)?null:dose,
    unit:split?split.unit:c.unit,
    route:c.route,
    notes:notesEl?notesEl.value:'',
    missed:false, quick:false, copied:false
  };
  S.logs=[entry].concat(S.logs);
  pushLog(entry);
  S.logPast=false;
  save(); render(false);
}

// ── Event binding ───────────────────────────────────────────────────────────
function bind(){
  document.querySelectorAll('[data-a]').forEach(function(el){el.addEventListener('click',onClick);});
  // Direct ID bindings for back buttons (bypasses data-a for reliability)
  // Direct bindings for back buttons
  var _backMap={'btn-back-past':goBackPast,'btn-back-cpd':goBackCpd,'btn-back-log':goBack,'btn-back-journal':function(){S.addingJournal=false;S.editJournalId=null;if(S.prevTab)S.tab=S.prevTab;render(false);}};
  function bindBackBtns(){
    Object.keys(_backMap).forEach(function(id){
      var el=document.getElementById(id);
      if(!el)return;
      el.onclick=function(e){e.preventDefault();e.stopPropagation();_backMap[id]();return false;};
    });
  }
  bindBackBtns();
  setTimeout(bindBackBtns,100);
  document.querySelectorAll('[data-eg] .e-btn').forEach(function(b){
    b.addEventListener('click',function(){
      var type=b.closest('[data-eg]').dataset.eg,val=+b.dataset.n;
      if(type==='yest')_ey=val;else _ec=val;
      b.closest('[data-eg]').querySelectorAll('.e-btn').forEach(function(x){x.classList.toggle('sel',+x.dataset.n<=val);});
    });
  });
}

function onClick(e){
  var el=e.currentTarget;
  var a=el.dataset.a,cid=el.dataset.id,sid=el.dataset.sid,lid=el.dataset.lid,eid=el.dataset.eid;
  if(a==='tab'){S.tab=el.dataset.v;render(false);}
  else if(a==='toggle'){doToggle(cid,sid||null);}
  else if(a==='save-day'){doSaveDay();}
  else if(a==='unlock-day'){doUnlockDay();}
  else if(a==='noop'){}
  else if(a==='desk-tab'){S.deskTab=el.dataset.v;render(false);}
  else if(a==='export-logs'){doExport('logs');}
  else if(a==='export-vitals'){doExport('vitals');}
  else if(a==='export-all'){doExport('all');}
  else if(a==='add-lab'){S.addingLab=true;render(false);}
  else if(a==='cancel-lab'){S.addingLab=false;render(false);}
  else if(a==='lab-cat'){S.labCat=el.dataset.v;render(true);}
  else if(a==='save-lab-draw'){var dEl=document.getElementById('lab-date'),lEl=document.getElementById('lab-label');doSaveLabDraw(dEl?dEl.value:TODAY.str,lEl?lEl.value:'');}
